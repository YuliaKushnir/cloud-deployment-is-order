apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cloud-demo

resources:
  # Namespace
  - namespace.yml

  # Infrastructure (databases, message brokers)
  - postgresql
  - rabbitmq
  - elasticsearch
  - keycloak

  # Application services
  - gateway-service
  - product-service
  - order-service
  - user-service
  - print-service
  - notification-service
  - frontend

  # Ingress (external access)
  - ingress