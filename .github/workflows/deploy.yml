name: Deploy to GKE

on:
  repository_dispatch:
    types: [deploy]

  workflow_dispatch:
    inputs:
      services:
        description: 'Services to deploy (comma-separated: gateway-service,product-service,order-service,user-service,notification-service or all)'
        required: true
        default: 'all'
      image_tag:
        description: 'Image tag to deploy'
        required: true
        default: 'latest'

env:
  GKE_PROJECT: ${{ secrets.GKE_PROJECT }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GKE_PROJECT }}
          install_components: 'gke-gcloud-auth-plugin'

      - name: Configure kubectl
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --zone ${{ env.GKE_ZONE }} \
            --project ${{ env.GKE_PROJECT }}

      - name: Determine deployment parameters
        id: params
        run: |
          OWNER_LC=$(echo "${{ secrets.IMAGE_OWNER || github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${OWNER_LC}" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "services=${{ github.event.client_payload.services }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.event.client_payload.tag }}" >> $GITHUB_OUTPUT
            echo "source_repo=${{ github.event.client_payload.source_repo }}" >> $GITHUB_OUTPUT
          else
            echo "services=${{ github.event.inputs.services }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
            echo "source_repo=manual" >> $GITHUB_OUTPUT
          fi

      - name: Update image versions in kustomization
        run: |
          cd kustomize
          SERVICES="${{ steps.params.outputs.services }}"
          TAG="${{ steps.params.outputs.tag }}"
          OWNER="${{ steps.params.outputs.owner }}"

          echo "Deploying services: $SERVICES with tag: $TAG"

          if [[ "$SERVICES" == "all" || "$SERVICES" == *"gateway-service"* ]]; then
            kustomize edit set image gateway-service=${{ env.REGISTRY }}/${OWNER}/gateway-is-order:${TAG}
          fi

          if [[ "$SERVICES" == "all" || "$SERVICES" == *"product-service"* ]]; then
            kustomize edit set image product-service=${{ env.REGISTRY }}/${OWNER}/product-service:${TAG}
          fi

          if [[ "$SERVICES" == "all" || "$SERVICES" == *"order-service"* ]]; then
            kustomize edit set image order-service=${{ env.REGISTRY }}/${OWNER}/order-service:${TAG}
          fi
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"print-service"* ]]; then
            kustomize edit set image print-service=${{ env.REGISTRY }}/${OWNER}/print-service:${TAG}
          fi
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"user-service"* ]]; then
            kustomize edit set image user-service=${{ env.REGISTRY }}/${OWNER}/user-service:${TAG}
          fi
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"notification-service"* ]]; then
            kustomize edit set image notification-service=${{ env.REGISTRY }}/${OWNER}/notification-service:${TAG}
          fi
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"frontend"* ]]; then
            echo "Updating frontend-service to $TAG"
            kustomize edit set image frontend=${{ env.REGISTRY }}/${OWNER}/frontend-is-order:${TAG}
          fi

      - name: Install nginx-ingress controller if not exists
        run: |
          if ! kubectl get namespace ingress-nginx &> /dev/null; then
            kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.9.4/deploy/static/provider/cloud/deploy.yaml
            kubectl wait --namespace ingress-nginx \
              --for=condition=ready pod \
              --selector=app.kubernetes.io/component=controller \
              --timeout=180s
          fi

      - name: Create namespace if not exists
        run: |
          kubectl create namespace cloud-demo --dry-run=client -o yaml | kubectl apply -f -

      - name: Create secrets if not exist
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}

          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_PORT: ${{ secrets.MAIL_PORT }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}

          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

          KEYCLOAK_REALM: ${{ secrets.KEYCLOAK_REALM }}
          KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
          KEYCLOAK_USERNAME: ${{ secrets.KEYCLOAK_USERNAME }}
          KEYCLOAK_PASSWORD: ${{ secrets.KEYCLOAK_PASSWORD }}
          KEYCLOAK_TARGET_CLIENT_ID: ${{ secrets.KEYCLOAK_TARGET_CLIENT_ID }}
          KEYCLOAK_ADMIN: ${{ secrets.KEYCLOAK_ADMIN }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}

        run: |
          chmod +x ./scripts/create-secrets.sh
          ./scripts/create-secrets.sh

      - name: Deploy to GKE
        run: |
          kubectl apply -k kustomize/

      - name: Restart deployments to pick up new images
        run: |
          SERVICES="${{ steps.params.outputs.services }}"
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"gateway-service"* ]]; then
            echo "Restarting gateway-service..."
            kubectl rollout restart deployment/gateway-service -n cloud-demo
          fi

          if [[ "$SERVICES" == "all" || "$SERVICES" == *"product-service"* ]]; then
            echo "Restarting product-service..."
            kubectl rollout restart deployment/product-service -n cloud-demo
          fi

          if [[ "$SERVICES" == "all" || "$SERVICES" == *"order-service"* ]]; then
            echo "Restarting order-service..."
            kubectl rollout restart deployment/order-service -n cloud-demo
          fi
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"user-service"* ]]; then
            echo "Restarting user-service..."
            kubectl rollout restart deployment/user-service -n cloud-demo
          fi
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"print-service"* ]]; then
            echo "Restarting print-service..."
            kubectl rollout restart deployment/print-service -n cloud-demo
          fi
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"notification-service"* ]]; then
            echo "Restarting notification-service..."
            kubectl rollout restart deployment/notification-service -n cloud-demo
          fi
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"frontend"* ]]; then
            echo "Restarting frontend..."
            kubectl rollout restart deployment/frontend -n cloud-demo
          fi

      - name: Wait for rollout
        run: |
          SERVICES="${{ steps.params.outputs.services }}"
            
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"gateway-service"* ]]; then
            kubectl rollout status deployment/gateway-service -n cloud-demo --timeout=120s || true
          fi
            
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"product-service"* ]]; then
            kubectl rollout status deployment/product-service -n cloud-demo --timeout=120s || true
          fi
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"print-service"* ]]; then
            kubectl rollout status deployment/print-service -n cloud-demo --timeout=120s || true
          fi
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"order-service"* ]]; then
            kubectl rollout status deployment/order-service -n cloud-demo --timeout=120s || true
          fi
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"user-service"* ]]; then
            kubectl rollout status deployment/user-service -n cloud-demo --timeout=120s || true
          fi
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"notification-service"* ]]; then
            kubectl rollout status deployment/notification-service -n cloud-demo --timeout=120s || true
          fi
          
          if [[ "$SERVICES" == "all" || "$SERVICES" == *"frontend"* ]]; then
            kubectl rollout status deployment/frontend -n cloud-demo --timeout=120s || true
          fi

      - name: Get deployment status
        run: |
          echo "=== Deployed Services ==="
          kubectl get services -n cloud-demo
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n cloud-demo
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n cloud-demo
          echo ""
          echo "=== Deployment triggered by: ${{ steps.params.outputs.source_repo }} ==="
          echo "=== Image tag: ${{ steps.params.outputs.tag }} ==="
          echo ""
          echo "=== ACCESS URL ==="
          INGRESS_IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          echo "Application URL: http://${INGRESS_IP}"
          echo ""
          
      - name: Commit kustomization changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add kustomize/kustomization.yml
          git diff --staged --quiet || git commit -m "Deploy: Update image tags to ${{ steps.params.outputs.tag }}

          Services: ${{ steps.params.outputs.services }}
          Source: ${{ steps.params.outputs.source_repo }}"
          git push || echo "No changes to push"